<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 220" font-family="Segoe UI, Arial, sans-serif">
  <text x="325" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Q20: Off-Policy MC for State Values — Two Episodes</text>
  <!-- Episode 1 -->
  <text x="20" y="60" font-size="12" font-weight="bold" fill="#1e40af">Episode 1:</text>
  <circle cx="120" cy="85" r="25" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="120" y="89" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">S</text>
  <circle cx="300" cy="85" r="25" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="300" y="89" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">S'</text>
  <circle cx="470" cy="85" r="25" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="470" y="89" text-anchor="middle" font-size="10" fill="#dc2626">Term</text>
  <line x1="145" y1="85" x2="270" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#a20)"/>
  <text x="208" y="75" text-anchor="middle" font-size="10" fill="#059669">a₁, r=+4</text>
  <line x1="325" y1="85" x2="440" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#a20)"/>
  <text x="383" y="75" text-anchor="middle" font-size="10" fill="#059669">a₂, r=+6</text>
  <!-- Episode 2 -->
  <text x="20" y="145" font-size="12" font-weight="bold" fill="#065f46">Episode 2:</text>
  <circle cx="120" cy="170" r="25" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="120" y="174" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">S</text>
  <circle cx="300" cy="170" r="25" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="300" y="174" text-anchor="middle" font-size="10" fill="#dc2626">Term</text>
  <line x1="145" y1="170" x2="270" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#a20)"/>
  <text x="208" y="160" text-anchor="middle" font-size="10" fill="#059669">a₂, r=+8</text>
  <rect x="400" y="140" width="220" height="60" rx="6" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="510" y="158" text-anchor="middle" font-size="9" fill="#0369a1">γ = 0.9</text>
  <text x="510" y="172" text-anchor="middle" font-size="9" fill="#0369a1">π(a₁|S)=0.7, b(a₁|S)=0.5</text>
  <text x="510" y="186" text-anchor="middle" font-size="9" fill="#0369a1">π(a₂|S)=0.3, b(a₂|S)=0.5</text>
  <defs><marker id="a20" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#475569"/></marker></defs>

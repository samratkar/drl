<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Segoe UI, Arial, sans-serif">
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Q5: Importance Sampling Ratio Calculation</text>
  <circle cx="100" cy="90" r="30" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="100" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f766e">S₁</text>
  <circle cx="280" cy="90" r="30" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="280" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f766e">S₂</text>
  <circle cx="460" cy="90" r="30" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="460" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f766e">S₃</text>
  <circle cx="620" cy="90" r="30" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="620" y="93" text-anchor="middle" font-size="11" fill="#dc2626">Terminal</text>
  <line x1="130" y1="90" x2="245" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#a5)"/>
  <text x="188" y="78" text-anchor="middle" font-size="10" fill="#059669">a₁, r=+5</text>
  <text x="188" y="115" text-anchor="middle" font-size="9" fill="#7c3aed">π=0.9, b=0.5</text>
  <line x1="310" y1="90" x2="425" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#a5)"/>
  <text x="368" y="78" text-anchor="middle" font-size="10" fill="#059669">a₂, r=+3</text>
  <text x="368" y="115" text-anchor="middle" font-size="9" fill="#7c3aed">π=0.6, b=0.4</text>
  <line x1="490" y1="90" x2="585" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#a5)"/>
  <text x="538" y="78" text-anchor="middle" font-size="10" fill="#059669">a₁, r=+2</text>
  <text x="538" y="115" text-anchor="middle" font-size="9" fill="#7c3aed">π=1.0, b=0.7</text>
  <rect x="80" y="150" width="540" height="35" rx="6" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="350" y="168" text-anchor="middle" font-size="10" fill="#0369a1">Compute per-step ratios ρ_t = π(a_t|s_t)/b(a_t|s_t) and cumulative ρ₀:₂ = ρ₀ × ρ₁ × ρ₂</text>
  <defs><marker id="a5" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#475569"/></marker></defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="Segoe UI, Arial, sans-serif">
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Q3: On-Policy First-Visit MC — Three Episodes</text>
  <!-- Episode 1 -->
  <text x="20" y="60" font-size="12" font-weight="bold" fill="#1e40af">Episode 1:</text>
  <circle cx="120" cy="85" r="22" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="120" y="89" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">S₁</text>
  <circle cx="270" cy="85" r="22" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="270" y="89" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">S₂</text>
  <circle cx="420" cy="85" r="22" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="420" y="89" text-anchor="middle" font-size="10" fill="#dc2626">Term</text>
  <line x1="142" y1="85" x2="243" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#a3)"/>
  <text x="193" y="75" text-anchor="middle" font-size="10" fill="#059669">Left, r=+2</text>
  <line x1="292" y1="85" x2="393" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#a3)"/>
  <text x="343" y="75" text-anchor="middle" font-size="10" fill="#059669">Right, r=+4</text>
  <!-- Episode 2 -->
  <text x="20" y="140" font-size="12" font-weight="bold" fill="#065f46">Episode 2:</text>
  <circle cx="120" cy="165" r="22" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="120" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">S₁</text>
  <circle cx="270" cy="165" r="22" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="270" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">S₂</text>
  <circle cx="420" cy="165" r="22" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="420" y="169" text-anchor="middle" font-size="10" fill="#dc2626">Term</text>
  <line x1="142" y1="165" x2="243" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#a3)"/>
  <text x="193" y="155" text-anchor="middle" font-size="10" fill="#059669">Left, r=+2</text>
  <line x1="292" y1="165" x2="393" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#a3)"/>
  <text x="343" y="155" text-anchor="middle" font-size="10" fill="#dc2626">Left, r=−3</text>
  <!-- Episode 3 -->
  <text x="20" y="220" font-size="12" font-weight="bold" fill="#7c3aed">Episode 3:</text>
  <circle cx="120" cy="245" r="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="120" y="249" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">S₁</text>
  <circle cx="270" cy="245" r="22" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="270" y="249" text-anchor="middle" font-size="10" fill="#dc2626">Term</text>
  <line x1="142" y1="245" x2="243" y2="245" stroke="#475569" stroke-width="2" marker-end="url(#a3)"/>
  <text x="193" y="235" text-anchor="middle" font-size="10" fill="#059669">Right, r=+7</text>
  <rect x="450" y="60" width="220" height="80" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="560" y="80" text-anchor="middle" font-size="10" fill="#64748b">γ = 0.95</text>
  <text x="560" y="96" text-anchor="middle" font-size="10" fill="#64748b">First-visit MC, averaging</text>
  <text x="560" y="112" text-anchor="middle" font-size="10" fill="#64748b">Initial Q(s,a) = 0</text>
  <text x="560" y="128" text-anchor="middle" font-size="10" fill="#64748b">Find Q(S₁, Left) and Q(S₁, Right)</text>
  <defs><marker id="a3" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#475569"/></marker></defs>
</svg>

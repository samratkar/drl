<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#495057"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="480" rx="12" fill="url(#bgGrad2)" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#212529">How Fast Does Initial Bias Q₁ = 5 Disappear?</text>
  <text x="430" y="52" text-anchor="middle" font-size="12" fill="#868e96">Weight of Q₁ in the estimate Q_n over time (true value q* = 0)</text>

  <!-- Chart area -->
  <g transform="translate(100, 75)">
    <!-- Panel background -->
    <rect x="-15" y="-10" width="700" height="360" rx="8" fill="white" filter="url(#shadow2)"/>

    <!-- Axes -->
    <line x1="40" y1="300" x2="660" y2="300" stroke="#495057" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="40" y1="300" x2="40" y2="15" stroke="#495057" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- X-axis label -->
    <text x="350" y="335" text-anchor="middle" font-size="13" fill="#495057">Steps (n)</text>

    <!-- Y-axis label -->
    <text x="-5" y="158" text-anchor="middle" font-size="13" fill="#495057" transform="rotate(-90, -5, 158)">Weight on Q₁</text>

    <!-- Y-axis ticks and grid -->
    <!-- 0.0 -->
    <text x="35" y="304" text-anchor="end" font-size="10" fill="#868e96">0.0</text>
    <!-- 0.2 -->
    <line x1="38" y1="240" x2="660" y2="240" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="35" y="244" text-anchor="end" font-size="10" fill="#868e96">0.2</text>
    <!-- 0.4 -->
    <line x1="38" y1="180" x2="660" y2="180" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="35" y="184" text-anchor="end" font-size="10" fill="#868e96">0.4</text>
    <!-- 0.6 -->
    <line x1="38" y1="120" x2="660" y2="120" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="35" y="124" text-anchor="end" font-size="10" fill="#868e96">0.6</text>
    <!-- 0.8 -->
    <line x1="38" y1="60" x2="660" y2="60" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="35" y="64" text-anchor="end" font-size="10" fill="#868e96">0.8</text>
    <!-- 1.0 -->
    <text x="35" y="4" text-anchor="end" font-size="10" fill="#868e96">1.0</text>

    <!-- X-axis ticks -->
    <!-- n=0 at x=40 -->
    <text x="40" y="316" text-anchor="middle" font-size="10" fill="#868e96">0</text>
    <!-- n=1 at x=64 (step = 24px per n for first few, then compress) -->
    <text x="64" y="316" text-anchor="middle" font-size="10" fill="#868e96">1</text>
    <!-- n=2 -->
    <text x="88" y="316" text-anchor="middle" font-size="10" fill="#868e96">2</text>
    <!-- n=5 -->
    <text x="160" y="316" text-anchor="middle" font-size="10" fill="#868e96">5</text>
    <!-- n=10 -->
    <text x="280" y="316" text-anchor="middle" font-size="10" fill="#868e96">10</text>
    <!-- n=15 -->
    <text x="400" y="316" text-anchor="middle" font-size="10" fill="#868e96">15</text>
    <!-- n=20 -->
    <text x="520" y="316" text-anchor="middle" font-size="10" fill="#868e96">20</text>
    <!-- n=25 -->
    <text x="640" y="316" text-anchor="middle" font-size="10" fill="#868e96">25</text>

    <!-- x scale: 24px per step -->

    <!-- ============================================ -->
    <!-- SAMPLE AVERAGE (1/n): drops to 0 at n=1     -->
    <!-- ============================================ -->
    <!-- Weight = 0 for all n >= 1 (Q1 fully replaced) -->
    <!-- n=0: weight=1.0 -> y=0 (top). n=1: weight=0 -> y=300 -->
    <line x1="40" y1="0" x2="40" y2="0" stroke="#1971c2" stroke-width="0"/>
    <!-- Vertical drop from (0, 1.0) to (1, 0.0) -->
    <path d="M 40 0 L 64 300" stroke="#1971c2" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Flat at 0 from n=1 onward -->
    <line x1="64" y1="300" x2="640" y2="300" stroke="#1971c2" stroke-width="3" stroke-linecap="round"/>
    <!-- Start dot -->
    <circle cx="40" cy="0" r="5" fill="#1971c2"/>
    <!-- n=1 dot -->
    <circle cx="64" cy="300" r="5" fill="#1971c2"/>

    <!-- Label for sample-average -->
    <text x="180" y="290" font-size="13" font-weight="bold" fill="#1971c2">Sample-average (α = 1/n)</text>
    <text x="180" y="305" font-size="11" fill="#1971c2">Bias = 0 after step 1</text>

    <!-- Annotation arrow: "Completely gone!" -->
    <line x1="100" y1="275" x2="68" y2="298" stroke="#1971c2" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <text x="102" y="270" font-size="10" fill="#1971c2" font-style="italic">Q₁ completely replaced by R₁</text>

    <!-- ============================================ -->
    <!-- CONSTANT α = 0.1: (1-α)^n = 0.9^n           -->
    <!-- ============================================ -->
    <!-- Points: n=0 y=0, n=1 y=30 (0.9), n=2 y=57 (0.81), n=5 y=123.3 (0.59),
         n=10 y=195.3 (0.349), n=15 y=242.7 (0.206), n=20 y=271.5 (0.122), n=25 y=286.8 (0.072) -->
    <path d="M 40 0
             L 64 30
             L 88 57
             L 112 77.1
             L 136 102
             L 160 123.3
             L 184 141
             L 208 156
             L 232 169
             L 256 183
             L 280 195.3
             L 304 205.5
             L 328 214.8
             L 352 222.6
             L 376 229.5
             L 400 235.5
             L 424 240.6
             L 448 245.1
             L 472 249.3
             L 496 252.6
             L 520 256.5
             L 544 259.2
             L 568 261.9
             L 592 264.3
             L 616 266.4
             L 640 268.2"
          stroke="#e8590c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Start dot -->
    <circle cx="40" cy="0" r="5" fill="#e8590c"/>
    <!-- Key dots -->
    <circle cx="64" cy="30" r="4" fill="#e8590c"/>
    <circle cx="160" cy="123.3" r="4" fill="#e8590c"/>
    <circle cx="280" cy="195.3" r="4" fill="#e8590c"/>
    <circle cx="520" cy="256.5" r="4" fill="#e8590c"/>

    <!-- Weight annotations on curve -->
    <text x="72" y="24" font-size="9" fill="#e8590c" font-weight="bold">0.90</text>
    <text x="168" y="117" font-size="9" fill="#e8590c" font-weight="bold">0.59</text>
    <text x="288" y="189" font-size="9" fill="#e8590c" font-weight="bold">0.35</text>
    <text x="528" y="250" font-size="9" fill="#e8590c" font-weight="bold">0.07</text>

    <!-- Label for constant alpha -->
    <text x="380" y="170" font-size="13" font-weight="bold" fill="#e8590c">Constant α = 0.1</text>
    <text x="380" y="186" font-size="11" fill="#e8590c">Weight on Q₁ = (1-α)ⁿ = 0.9ⁿ</text>
    <text x="380" y="200" font-size="11" fill="#e8590c" font-style="italic">Decays but never reaches zero</text>

    <!-- ============================================ -->
    <!-- CONSTANT α = 0.4: (1-α)^n = 0.6^n           -->
    <!-- ============================================ -->
    <!-- Points: n=0 y=0, n=1 y=120(0.6), n=2 y=192(0.36), n=3 y=235.2(0.216),
         n=4 y=261.1(0.1296), n=5 y=276.7(0.0778), n=6 y=286(0.0467),
         n=7 y=291.6(0.028), n=8 y=295(0.0168), n=10 y=298.2(0.006) -->
    <path d="M 40 0
             L 64 120
             L 88 192
             L 112 235.2
             L 136 261.1
             L 160 276.7
             L 184 286
             L 208 291.6
             L 232 295
             L 280 298.2
             L 400 299.7
             L 640 300"
          stroke="#d6336c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4"/>
    <!-- Start dot -->
    <circle cx="40" cy="0" r="5" fill="#d6336c"/>
    <circle cx="64" cy="120" r="4" fill="#d6336c"/>
    <circle cx="160" cy="276.7" r="4" fill="#d6336c"/>

    <!-- Weight annotations -->
    <text x="72" y="114" font-size="9" fill="#d6336c" font-weight="bold">0.60</text>
    <text x="168" y="270" font-size="9" fill="#d6336c" font-weight="bold">0.08</text>

    <!-- Label -->
    <text x="250" y="230" font-size="13" font-weight="bold" fill="#d6336c">Constant α = 0.4</text>
    <text x="250" y="246" font-size="11" fill="#d6336c">Faster decay: 0.6ⁿ</text>

  </g>

  <!-- Legend -->
  <g transform="translate(100, 445)">
    <rect x="80" y="-10" width="520" height="30" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <line x1="100" y1="5" x2="130" y2="5" stroke="#1971c2" stroke-width="3"/>
    <text x="135" y="9" font-size="11" fill="#495057">α = 1/n (instant drop)</text>
    <line x1="290" y1="5" x2="320" y2="5" stroke="#e8590c" stroke-width="3"/>
    <text x="325" y="9" font-size="11" fill="#495057">α = 0.1 (slow decay)</text>
    <line x1="470" y1="5" x2="500" y2="5" stroke="#d6336c" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="505" y="9" font-size="11" fill="#495057">α = 0.4 (fast decay)</text>
  </g>
</svg>
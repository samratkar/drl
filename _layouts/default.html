<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  {% seo %}

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8fafc; /* Lighter slate background */
      color: #1e293b;
    }
    
    .full-width-header {
      width: 100%;
      background: #0f172a !important; /* Professional Dark Slate/Blue */
      border-bottom: 4px solid #3b82f6; /* Accent blue line */
    }
    
    .nav-link {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }
    
    .nav-link:hover {
      color: white;
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
    }

    /* Professional Markdown Content Styling */
    .markdown-content {
      line-height: 1.7;
      color: #334155;
    }
    .markdown-content h1, .markdown-content h2, .markdown-content h3 {
      color: #0f172a;
      font-weight: 700;
      margin-top: 2.5rem;
      margin-bottom: 1.25rem;
      letter-spacing: -0.025em;
    }
    .markdown-content h1 { font-size: 2.5rem; }
    .markdown-content h2 { font-size: 1.75rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
    .markdown-content h3 { font-size: 1.35rem; }
    
    .markdown-content p { margin-bottom: 1.5rem; }
    .markdown-content ul { margin-bottom: 1.5rem; padding-left: 1.5rem; list-style-type: disc !important; }
    .markdown-content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; list-style-type: decimal !important; }
    .markdown-content li { margin-bottom: 0.65rem; }
    .markdown-content li::marker { color: #3b82f6; } /* Professional blue bullets */
    
    .markdown-content a {
      color: #2563eb;
      text-decoration: underline;
      text-underline-offset: 4px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .markdown-content a:hover {
      color: #1d4ed8;
      text-decoration-thickness: 2px;
    }
    
    .markdown-content code {
      font-family: 'JetBrains Mono', monospace;
      background-color: #f1f5f9;
      color: #111827;
      padding: 0.2rem 0.4rem;
      border-radius: 0.375rem;
      font-size: 0.875em;
    }
    
    .markdown-content pre {
      font-family: 'JetBrains Mono', monospace;
      background-color: #f6f8fa; /* Light grey background for contrast */
      color: #111827; /* Deep black/blue for base text */
      padding: 1.5rem;
      border-radius: 0.75rem;
      overflow-x: auto;
      margin: 2rem 0;
      border: 1px solid #d0d7de;
    }

    /* Vibrant Syntax Highlighting */
    .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: #d73a49; font-weight: bold; } /* Keywords: Bold Red */
    .highlight .s, .highlight .s1, .highlight .s2, .highlight .sb, .highlight .sc, .highlight .sd, .highlight .sh, .highlight .si, .highlight .sx, .highlight .sr, .highlight .ss { color: #032f62; } /* Strings: Deep Blue */
    .highlight .c, .highlight .c1, .highlight .cm { color: #6a737d; font-style: italic; } /* Comments: Grey */
    .highlight .nf, .highlight .fm { color: #6f42c1; font-weight: bold; } /* Functions: Bold Purple */
    .highlight .nc, .highlight .nn { color: #e36209; } /* Classes/Modules: Orange */
    .highlight .mi, .highlight .mf, .highlight .mh, .highlight .mo, .highlight .il { color: #005cc5; } /* Numbers: Blue */
    .highlight .o, .highlight .ow { color: #d73a49; font-weight: bold; } /* Operators */
    .highlight .nb { color: #005cc5; } /* Built-ins */
    .highlight .p { color: #24292e; } /* Punctuation */

    /* Tables Styling */
    .markdown-content table {
      width: 100%;
      margin: 2rem 0;
      border-collapse: collapse;
      font-size: 0.9rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .markdown-content th {
      background-color: #f8fafc;
      color: #0f172a;
      font-weight: 700;
      padding: 0.75rem 1rem;
      border-bottom: 2px solid #e2e8f0;
      text-align: left;
    }
    .markdown-content td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
    }
    .markdown-content tr:nth-child(even) {
      background-color: #fcfcfd;
    }
    .markdown-content tr:hover {
      background-color: #f1f5f9;
    }

    /* Mermaid */
    .mermaid { background: white !important; margin: 2.5rem 0; padding: 1.5rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; display: flex; justify-content: center; }
  </style>

  <!-- MathJax -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Mermaid -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
  </script>
</head>
<body>
  <header class="full-width-header shadow-xl">
    <div class="w-full max-w-[1600px] mx-auto px-8 py-6">
      <div class="flex items-center justify-between flex-wrap gap-8">
        <div class="flex-1">
          <h1 class="text-2xl font-bold text-white tracking-tight" style="font-family: 'Inter', sans-serif;">
            <a href="{{ "/" | relative_url }}" class="hover:text-blue-400 transition-colors">DRL / {{ site.title }}</a>
          </h1>
          <p class="mt-1 text-slate-400 text-xs font-medium uppercase tracking-widest">{{ site.description }}</p>
        </div>
        <nav class="flex gap-2">
          <a href="{{ "/" | relative_url }}" class="nav-link">COURSE INDEX</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="w-full max-w-[1600px] mx-auto px-8 py-10">
    <article class="markdown-content bg-white p-10 rounded-xl shadow-sm border border-slate-200">
      {{ content }}
    </article>
  </main>

  <footer class="w-full max-w-[1600px] mx-auto px-8 py-12 text-center text-slate-400 text-xs font-medium border-t border-slate-100 uppercase tracking-widest">
    &copy; {{ "now" | date: "%Y" }} {{ site.github_username }} &middot; RESEARCH & EDUCATION
  </footer>
</body>
</html>

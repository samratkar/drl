title: Deep Reinforcement Learning (DRL)
email: samratkar@example.com
description: >-
  A collection of notes, assignments, and case studies on Deep Reinforcement Learning.
baseurl: "/drl"
url: "https://samratkar.github.io"
github_username: samratkar

# Site settings
markdown: kramdown
permalink: /:year/:month/:day/:title.html
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: true

# Plugin configurations
optional_front_matter:
  remove_surrounding_whitespace: true

titles_from_headings:
  strip_title: true
  collections: true

# Exclude these files from Jekyll build
# Only files with layout: post are intended for publishing in the main portal lists.
exclude:
  - .venv
  - .python-version
  - pyproject.toml
  - uv.lock
  - requirements.txt
  - .DS_Store
  - .git
  - .github
  - node_modules
  - vendor
  - README.md # index.md will be used instead
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
